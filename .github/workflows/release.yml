name: Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-latest
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore ViennaDotNet.slnx

      - name: Publish build
        shell: bash
        run: |
          dotnet publish src/launcher/launcher.csproj \
            -c Release \
            -r ${{ matrix.rid }} \
            --self-contained false \
            -o build/${{ matrix.rid }}

      - name: Create server EULA
        shell: bash
        run: |
          mkdir -p build/${{ matrix.rid }}/staticdata/server_template_dir
          echo "eula=true" > build/${{ matrix.rid }}/staticdata/server_template_dir/eula.txt

      - name: Package release
        shell: bash
        run: |
          cd build
          tar -czf ViennaDotNet-${{ matrix.rid }}.tar.gz ${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ViennaDotNet-${{ matrix.rid }}
          path: build/ViennaDotNet-${{ matrix.rid }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_files

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/**/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
